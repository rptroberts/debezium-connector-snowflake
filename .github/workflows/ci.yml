name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build and Unit Tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and run unit tests
        run: mvn clean test

      - name: Build connector archive
        run: mvn clean package -Passembly -DskipTests

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debezium-connector-snowflake
          path: |
            target/debezium-connector-snowflake-*.tar.gz
            target/debezium-connector-snowflake-*.zip
          retention-days: 30

  integration-test:
    runs-on: ubuntu-latest
    name: Integration Tests
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run integration tests
        env:
          SNOWFLAKE_URL: ${{ secrets.SNOWFLAKE_URL }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
        run: mvn verify -Pfailsafe

  release:
    runs-on: ubuntu-latest
    name: Release
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build connector archive
        run: mvn clean package -Passembly -DskipTests

      - name: Publish to GitHub Packages
        run: mvn deploy -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/debezium-connector-snowflake-*.tar.gz
            target/debezium-connector-snowflake-*.zip
          generate_release_notes: true
